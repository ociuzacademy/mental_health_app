{% extends 'User/user_home.html' %}
{% block content %}

<style>

    .mental-test-section{
        padding:60px 0;
        background:#f4f7fb;
    }

    .test-card{
        background:#fff;
        padding:40px;
        border-radius:15px;
        box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    .test-title{
        text-align:center;
        margin-bottom:10px;
        color:#2c3e50;
        font-weight:bold;
    }

    .test-subtitle{
        text-align:center;
        margin-bottom:40px;
        color:#7f8c8d;
    }

    .question-box{
        background:#fafafa;
        border-left:5px solid #007bff;
        padding:20px;
        margin-bottom:25px;
        border-radius:10px;
    }

    .question-label{
        font-size:18px;
        font-weight:600;
        color:#34495e;
        margin-bottom:15px;
        display:block;
    }

    .question-text{
        width:100%;
        border:none;
        background:transparent;
        font-size:17px;
        color:#2d3436;
        margin-bottom:15px;
        font-weight:500;
    }

    .form-select{
        width:100%;
        padding:12px;
        border-radius:8px;
        border:1px solid #ced4da;
        font-size:15px;
    }

    .submit-btn{
        width:100%;
        padding:14px;
        border:none;
        background:#007bff;
        color:white;
        font-size:18px;
        border-radius:10px;
        transition:0.3s;
        font-weight:bold;
    }

    .submit-btn:hover{
        background:#0056b3;
    }

</style>

<div class="mental-test-section">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-10">

                <div class="test-card">

                    <h1 class="test-title">
                        Mental Health Assessment
                    </h1>

                    <p class="test-subtitle">
                        Please answer the following questions honestly to help analyze your mental wellness.
                    </p>

                    <form action="/user_test/" method="post">

                        {% csrf_token %}

                        {% for x in var %}

                        <div class="question-box">

                            <label class="question-label">
                                Question {{forloop.counter}}
                            </label>

                            <input type="text"
                                   class="question-text"
                                   value="{{x.question}}"
                                   readonly>

                            <input type="hidden"
                                   name="fnameid"
                                   value="{{x.id}}">

                            <select class="form-select" name="ans" required>

                                <option selected disabled>
                                    -- Select Your Answer --
                                </option>

                                <option value="5">
                                    {{x.option1}}
                                </option>

                                <option value="10">
                                    {{x.option2}}
                                </option>

                                <option value="15">
                                    {{x.option3}}
                                </option>

                                <option value="20">
                                    {{x.option4}}
                                </option>

                            </select>

                        </div>

                        {% endfor %}

                        <button type="submit" class="submit-btn">
                            Submit Assessment
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
